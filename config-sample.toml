# chronos configuration sample. Copy to config.toml and edit to taste.
#
# Path values support ~, $VAR, and %VAR% expansion.

config_version = 1

# Show Unicode glyphs in the TUI. Off by default so terminals without a
# suitable font fall back cleanly.
use_utf8 = false

# External editor invoked for long-form event editing.
# editor = "vim"

# [[accounts]]
# name = "personal"
# url = "https://caldav.example.com/dav/principals/user@example.com/"
# username = "user@example.com"
# credential = { backend = "env", variable = "CHRONOS_PERSONAL_PASSWORD" }
# # mirror_path is optional; defaults to <user-data-dir>/mirror/<name>.
# # mirror_path = "~/.local/share/chronos/mirror/personal"
# # trash_retention_days defaults to 30.
# # include / exclude are Python regexes (re.fullmatch); default include = [".*"].

# [[accounts]]
# name = "google"
# credential = { backend = "google", client_id = "12345.apps.googleusercontent.com", client_secret = "GOCSPX-..." }
# # The "google" backend defaults the CalDAV URL, OAuth scope, and
# # username for you. Only the client_id/client_secret from your
# # Google Cloud project are required (OAuth client type must be
# # "Desktop app", same as Thunderbird). The first `chronos sync` opens
# # your browser, captures the redirect on a random local port, and
# # stores the tokens under the OS-standard user data directory
# # (tokens/<account>.json), not here.
