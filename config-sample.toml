# chronos configuration sample. Copy to config.toml and edit to taste.
#
# Path values support ~, $VAR, and %VAR% expansion.

config_version = 1

# Show Unicode glyphs in the TUI. Off by default so terminals without a
# suitable font fall back cleanly.
use_utf8 = false

